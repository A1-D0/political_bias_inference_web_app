name: CI

on: 
  push:
  pull_request:

jobs:
  flask-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: services/ml_inference

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/ml_inference/dev_requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev_requirements.txt
          pip install --force-reinstall wheels/utils-*.whl

      - name: Install GitHub CLI and unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y gh unzip

      - name: Download model assets from the latest GitHub Release
        env: 
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "Inference_Models_v1.0" \
            --repo "${{ github.repository }}" \
            --pattern "model_artifacts_v1.zip" \
            --dir src/models

          unzip -o src/models/model_artifacts_v1.zip -d src/models/
          rm src/models/model_artifacts_v1.zip
          ls -la src/models/

      - name: Create test API key file
        run: |
          mkdir -p secrets
          echo "ci-test-api-key" > secrets/test_api_key.txt

      - name: Run pytest
        env: 
          INTERNAL_API_KEY: secrets/test_api_key.txt
          MODEL_PATH: src/models/linear_svc_pipeline_v1.joblib
          LABEL_ENCODER_PATH: src/models/articles-bypublisher_LabelEncoder_v1.joblib
        run: |
          python -m pytest -q

  typescript-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: web_app/server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_app/server/package-lock.json

      - name: Install and build shared/ dependencies
        run: |
          cd ../shared
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci 

      - name: Create test API key file
        run: |
          mkdir -p secrets
          echo "ci-test-api-key" > secrets/test_api_key.txt

      - name: Create .env.test file for test/setup.ts
        run: |
          echo "PORT=3000" > .env.test
          echo "INFERENCE_API_URL=http://localhost:5020" >> .env.test
          echo "INFERENCE_API_KEY=secrets/test_api_key.txt" >> .env.test

      - name: Run tests
        run: npm run test 

